# ========================
# Habitat Zero — application.properties
# ========================

# Servidor
server.port=8080

# Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/habitat_zero?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Jackson — serialize LocalDateTime as ISO-8601 string, not array
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
jwt.secret=HabitatZeroSecretKey2026FIAPGlobalSolution!SuperSegura
jwt.expiration=28800000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Thresholds de alerta (configuráveis)
alert.threshold.oxigenio.min=19.5
alert.threshold.umidade.solo.min=30.0
alert.threshold.radiacao.max=2.0
alert.threshold.temperatura.max=40.0